<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoP QR Code</title>
  <script src="assets/js/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    h1 { font-size: 1.15rem; margin-bottom: 10px; color: #2c3e50; }
    p { font-size: 0.88rem; color: #5d6d7e; margin-bottom: 16px; line-height: 1.55; }
    label {
      display: block;
      text-align: left;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #34495e;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d5dbdb;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2980b9;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 18px;
    }
    #qrcode {
      min-height: 280px;
      min-width: 280px;
      display: inline-block;
      padding: 10px;
      border: 1px solid #ecf0f1;
      border-radius: 8px;
    }
    #qrcode img { display: block; }
    .url-line {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #7f8c8d;
      word-break: break-all;
    }
    a { color: #2980b9; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CoP Verification QR</h1>
    <p>
      <code>url.txt</code> এ লিংক লিখুন → QR তৈরি হবে। স্ক্যান করলে
      <strong>certificate.html</strong> খুলবে।
    </p>

    <label for="pageUrl">পেজের লিংক (http/https)</label>
    <input id="pageUrl" type="text" spellcheck="false" placeholder="https://yoursite.com/certificate.html" />
    <button type="button" id="makeBtn">QR তৈরি করুন</button>

    <div id="qrcode" aria-label="QR code"></div>
    <p class="url-line" id="urlLine"></p>

    <p style="margin-top:16px;font-size:0.82rem">
      Python: <code>py generate_qr.py</code> &nbsp;|&nbsp;
      <a href="certificate.html">পেজ দেখুন</a>
    </p>
  </div>

  <script>
    const input = document.getElementById("pageUrl");
    const box = document.getElementById("qrcode");
    const urlLine = document.getElementById("urlLine");

    function parseUrlFile(text) {
      return text
        .split(/\r?\n/)
        .map((s) => s.trim())
        .find((s) => s && !s.startsWith("#"));
    }

    function drawQr(url) {
      box.innerHTML = "";
      urlLine.textContent = url || "";

      if (!url || !/^https?:\/\//i.test(url)) {
        box.textContent = "সঠিক http/https URL দিন";
        return;
      }
      if (typeof QRCode === "undefined") {
        box.textContent = "qrcode.min.js লোড হয়নি";
        return;
      }
      new QRCode(box, {
        text: url,
        width: 280,
        height: 280,
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    document.getElementById("makeBtn").addEventListener("click", () => {
      drawQr(input.value.trim());
    });

    fetch("url.txt")
      .then((r) => r.text())
      .then((t) => {
        const url = parseUrlFile(t);
        if (url) {
          input.value = url;
          drawQr(url);
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
